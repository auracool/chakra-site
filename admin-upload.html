<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Update Chakra JSON</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b0811;
      color: #f4ead2;
      margin: 0;
      padding: 32px;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      background: #171120;
      border: 1px solid #3a2b4d;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    h1 { margin-top: 0; color: #e8c547; }
    label { display: block; margin: 18px 0 8px; font-weight: 700; }
    input, button, textarea {
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid #3a2b4d;
      background: #0f0b16;
      color: #f4ead2;
      padding: 12px;
      font: inherit;
    }
    button {
      margin-top: 18px;
      cursor: pointer;
      background: #c9a227;
      color: #07050a;
      border: none;
      font-weight: 800;
    }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .status {
      margin-top: 18px;
      padding: 12px;
      border-radius: 10px;
      white-space: pre-wrap;
      background: #0f0b16;
      border: 1px solid #3a2b4d;
    }
    .ok { border-color: #2ecc71; }
    .bad { border-color: #e74c3c; }
    small { color: #b8a77d; line-height: 1.5; display:block; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Update Chakra JSON</h1>
    <p>Choose the updated <code>chakra_main.json</code> file, enter the upload password, then click update. This will commit the JSON file to GitHub.</p>

    <label for="password">Upload password</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="Enter admin password" />

    <label for="jsonFile">JSON file</label>
    <input id="jsonFile" type="file" accept=".json,application/json" />

    <small>
      The file must be a valid JSON array. Example: <code>[{ "n": "Geb", "tr": "Egyptian", ... }]</code>
    </small>

    <button id="uploadBtn">Update Site JSON</button>

    <div id="status" class="status">Ready.</div>
  </main>

<script>
const WORKER_URL = "https://chakra-json-uploader.jdcoleman6.workers.dev/update-json";
// After deploying your Worker, replace this with your actual Worker URL.

const statusBox = document.getElementById("status");
const fileInput = document.getElementById("jsonFile");
const passwordInput = document.getElementById("password");
const uploadBtn = document.getElementById("uploadBtn");

function setStatus(message, good = null) {
  statusBox.textContent = message;
  statusBox.className = "status" + (good === true ? " ok" : good === false ? " bad" : "");
}

uploadBtn.addEventListener("click", async () => {
  const file = fileInput.files[0];
  const password = passwordInput.value.trim();

  if (!password) {
    setStatus("Please enter the upload password.", false);
    return;
  }

  if (!file) {
    setStatus("Please choose chakra_main.json first.", false);
    return;
  }

  uploadBtn.disabled = true;
  setStatus("Checking JSON…");

  try {
    const text = await file.text();
    const parsed = JSON.parse(text);

    if (!Array.isArray(parsed)) {
      throw new Error("JSON must be an array of deity records.");
    }

    setStatus("Uploading to GitHub…");

    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-Upload-Password": password
      },
      body: JSON.stringify(parsed)
    });

    const result = await res.json().catch(() => ({}));

    if (!res.ok) {
      throw new Error(result.error || "Upload failed.");
    }

    setStatus(
      "Success. GitHub has been updated.\n\nCommit: " +
      (result.commitUrl || "created") +
      "\n\nRefresh the site in about a minute.",
      true
    );
  } catch (err) {
    setStatus("Error: " + err.message, false);
  } finally {
    uploadBtn.disabled = false;
  }
});
</script>
</body>
</html>
